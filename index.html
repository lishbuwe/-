<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="律律养成计划">
<meta name="theme-color" content="#fef6ee">
<title>律律养成计划</title>
  
<link rel="apple-touch-icon" href="/-/apple-touch-icon.png?v=3">
<link rel="icon" href="/-/apple-touch-icon.png?v=3">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fef6ee; --bg2:#fff9f4; --card:#ffffff;
  --pink:#ff8fab; --pink2:#ffb3c6; --pink3:#ffe4ec;
  --mint:#6dcca0; --mint2:#b8edcf; --mint3:#e8f8f0;
  --yellow:#ffc947; --yellow2:#ffe599; --yellow3:#fff8e1;
  --blue:#5bbcdd; --blue2:#a8dff0; --blue3:#e3f6fd;
  --purple:#b39ddb; --purple2:#d4c5f5; --purple3:#f0ecff;
  --peach:#ff9d7a; --peach2:#ffc9b5; --peach3:#fff0ea;
  --text:#3d2c2c; --muted:#b09898; --dim:#e8d8d0;
  --shadow:0 4px 20px rgba(200,150,150,0.12);
  --shadow2:0 8px 32px rgba(200,150,150,0.18);
  --sb:env(safe-area-inset-bottom,0px);
  --radius:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;overscroll-behavior:none;}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100%;}
#content{flex:1;overflow-y:auto;padding:0 16px 24px;}
#content::-webkit-scrollbar{display:none;}

/* ── Notif ── */
#notif{position:fixed;top:20px;left:50%;transform:translateX(-50%);
  padding:11px 24px;border-radius:100px;font-size:13px;font-weight:800;
  white-space:nowrap;z-index:9999;box-shadow:0 8px 30px rgba(255,143,171,0.3);
  pointer-events:none;display:none;background:var(--pink);color:#fff;}
#notif.show{display:block;animation:nfx 2.8s ease forwards;}
#notif.green{background:var(--mint);color:#fff;}
#notif.err{background:#ff6b6b;color:#fff;}
@keyframes nfx{
  0%{opacity:0;transform:translateX(-50%) translateY(-14px);}
  14%{opacity:1;transform:translateX(-50%) translateY(0);}
  78%{opacity:1;transform:translateX(-50%) translateY(0);}
  100%{opacity:0;transform:translateX(-50%) translateY(-10px);}
}

/* ── Achievement popup ── */
#ach-overlay{position:fixed;inset:0;background:rgba(61,44,44,0.4);backdrop-filter:blur(4px);z-index:9997;display:none;}
#ach-overlay.show{display:block;}
#ach-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);
  background:var(--card);border-radius:28px;padding:32px 28px;text-align:center;z-index:9998;display:none;
  box-shadow:0 24px 60px rgba(255,143,171,0.3);max-width:300px;width:90%;}
#ach-popup.show{display:block;animation:achPop 0.4s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes achPop{from{opacity:0;transform:translate(-50%,-50%) scale(0.7);}to{opacity:1;transform:translate(-50%,-50%) scale(1);}}
.ach-pop-tag{display:inline-block;background:var(--yellow3);color:var(--yellow);
  font-size:11px;font-weight:800;padding:4px 14px;border-radius:100px;margin-bottom:12px;letter-spacing:1px;}
.ach-pop-close{margin-top:18px;padding:11px 32px;border-radius:100px;border:none;
  background:linear-gradient(135deg,var(--pink),var(--peach));color:#fff;font-size:14px;font-weight:800;
  font-family:'Nunito',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(255,143,171,0.4);}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(61,44,44,0.35);backdrop-filter:blur(3px);
  z-index:8000;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;animation:fadeIn 0.2s ease;}
.modal{background:var(--bg2);border-radius:28px 28px 0 0;padding:28px 20px;width:100%;max-width:480px;
  padding-bottom:calc(24px + var(--sb));animation:slideUp 0.28s cubic-bezier(.34,1.2,.64,1);max-height:90vh;overflow-y:auto;}
.modal::-webkit-scrollbar{display:none;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.modal h3{font-size:17px;font-weight:900;color:var(--text);}
.modal-close{background:var(--dim);border:none;color:var(--muted);font-size:15px;cursor:pointer;
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;}
.field-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;margin-top:16px;letter-spacing:.5px;}
.field-input{width:100%;background:var(--card);border:2px solid var(--dim);
  border-radius:14px;padding:12px 15px;color:var(--text);font-size:14px;font-weight:600;
  font-family:'Nunito',sans-serif;outline:none;transition:border-color 0.2s;}
.field-input:focus{border-color:var(--pink2);}
.attr-pick{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.attr-opt{padding:7px 14px;border-radius:100px;border:2px solid var(--dim);
  background:var(--card);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Nunito',sans-serif;transition:all 0.15s;}
.attr-opt.sel{color:#fff;border-color:transparent;}
.modal-btn{width:100%;margin-top:20px;padding:15px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--pink),var(--peach));color:#fff;font-size:15px;font-weight:900;
  font-family:'Nunito',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(255,143,171,0.35);transition:all 0.15s;}
.modal-btn:active{transform:scale(0.98);}
.modal-btn.danger{background:linear-gradient(135deg,#ff6b6b,#ee5a24);}
.color-pick{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.color-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s;}
.color-dot.sel{border-color:var(--text);transform:scale(1.15);}

/* ── Header ── */
#header{padding:calc(52px + env(safe-area-inset-top,0px)) 20px 16px;text-align:center;
  background:linear-gradient(180deg,#fff5ee 0%,var(--bg) 100%);}
#header h1{font-family:'ZCOOL XiaoWei',serif;font-size:26px;color:var(--pink);
  letter-spacing:4px;margin-bottom:4px;text-shadow:0 2px 8px rgba(255,143,171,0.2);}
#header .subtitle{font-size:11px;color:var(--muted);margin-bottom:14px;font-weight:600;}
.stats{display:flex;justify-content:center;gap:10px;}
.stat-pill{background:var(--card);border-radius:100px;padding:8px 16px;
  font-size:12px;font-weight:700;color:var(--muted);box-shadow:var(--shadow);
  display:flex;align-items:center;gap:5px;}
.stat-pill b{color:var(--text);font-size:15px;font-weight:900;}

/* ── Tabs ── */
#tabs{display:flex;gap:6px;padding:14px 16px;overflow-x:auto;scrollbar-width:none;}
#tabs::-webkit-scrollbar{display:none;}
.tab{padding:8px 16px;border-radius:100px;border:none;background:var(--card);
  color:var(--muted);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;box-shadow:0 2px 8px rgba(200,150,150,0.08);}
.tab.active{background:linear-gradient(135deg,var(--pink),var(--peach));color:#fff;
  box-shadow:0 4px 16px rgba(255,143,171,0.35);}

/* ── Section header ── */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.sec-label{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.5px;}
.add-btn{padding:7px 16px;border-radius:100px;border:none;
  background:linear-gradient(135deg,var(--pink),var(--peach));color:#fff;
  font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;
  box-shadow:0 3px 12px rgba(255,143,171,0.35);transition:all 0.15s;}
.add-btn:active{transform:scale(0.96);}

/* ── Top bar ── */
.top-bar{height:8px;background:var(--dim);border-radius:100px;margin-bottom:18px;overflow:hidden;}
.top-bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--pink),var(--peach));
  transition:width 0.6s cubic-bezier(.34,1.3,.64,1);}

/* ── Task rows ── */
.task-row{display:flex;align-items:center;gap:12px;padding:14px 15px;margin-bottom:10px;
  border-radius:var(--radius);background:var(--card);
  box-shadow:var(--shadow);cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;
  animation:fadeUp 0.35s ease both;}
.task-row:active{transform:scale(0.98);box-shadow:0 2px 8px rgba(200,150,150,0.1);}
.task-row.done{background:var(--mint3);box-shadow:none;cursor:default;}
.task-check{width:26px;height:26px;border-radius:50%;flex-shrink:0;
  border:2.5px solid var(--c,var(--pink));display:flex;align-items:center;
  justify-content:center;transition:all 0.25s;background:transparent;}
.task-row.done .task-check{border-color:var(--mint);background:var(--mint);box-shadow:0 2px 8px rgba(109,204,160,0.4);}
.check-inner{font-size:13px;color:#fff;display:none;font-weight:900;}
.task-row.done .check-inner{display:block;}
.task-name{font-size:14px;font-weight:700;flex:1;color:var(--text);}
.task-row.done .task-name{color:var(--mint);text-decoration:line-through;opacity:0.8;}
.task-meta{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;}
.task-btns{display:flex;gap:4px;flex-shrink:0;}
.task-act{background:var(--bg);border:none;font-size:13px;cursor:pointer;
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.15s;}
.task-row:hover .task-act{opacity:1;}
.task-row:active .task-act{opacity:1;}

.evolve-card{padding:18px;border-radius:var(--radius);background:linear-gradient(135deg,var(--yellow3),var(--peach3));
  border:2px dashed var(--yellow2);margin-top:14px;animation:fadeUp 0.4s 0.2s ease both;}
.evolve-label{font-size:11px;font-weight:800;color:var(--yellow);margin-bottom:5px;letter-spacing:.5px;}
.evolve-desc{font-size:12px;color:var(--muted);margin-bottom:14px;font-weight:600;line-height:1.6;}
.evolve-btn{padding:8px 20px;border-radius:100px;border:none;
  background:linear-gradient(135deg,var(--yellow),var(--peach));color:#fff;
  cursor:pointer;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;
  box-shadow:0 3px 12px rgba(255,201,71,0.4);transition:all 0.15s;}

/* ── Attrs ── */
.attr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.attr-card{padding:18px 15px;border-radius:var(--radius);background:var(--card);
  box-shadow:var(--shadow);animation:fadeUp 0.3s ease both;position:relative;overflow:hidden;}
.attr-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;
  border-radius:50%;background:var(--cc,#ffeee4);opacity:0.5;}
.attr-card.locked{opacity:0.45;filter:grayscale(0.5);}
.attr-emoji{font-size:26px;margin-bottom:8px;position:relative;}
.attr-name{font-size:13px;font-weight:900;margin-bottom:2px;position:relative;}
.attr-desc{font-size:10px;color:var(--muted);margin-bottom:12px;font-weight:600;position:relative;}
.attr-lv-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px;position:relative;}
.attr-lv{font-weight:800;}.attr-xp{color:var(--muted);font-weight:600;}
.xp-bar{height:6px;background:var(--dim);border-radius:100px;overflow:hidden;position:relative;}
.xp-fill{height:100%;border-radius:100px;transition:width 0.8s cubic-bezier(.34,1.3,.64,1);}
.lock-badge{position:absolute;top:12px;right:12px;font-size:14px;}

/* ── Quests ── */
.quest-card{padding:18px 16px;border-radius:var(--radius);background:var(--card);
  margin-bottom:12px;box-shadow:var(--shadow);animation:fadeUp 0.3s ease both;}
.quest-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.quest-title{font-size:15px;font-weight:800;color:var(--text);}
.quest-sub{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600;}
.quest-num{font-size:22px;font-weight:900;line-height:1;}
.quest-num span{font-size:11px;font-weight:600;color:var(--muted);}
.quest-bar{height:8px;background:var(--dim);border-radius:100px;margin-bottom:14px;overflow:hidden;}
.quest-fill{height:100%;border-radius:100px;transition:width 0.6s cubic-bezier(.34,1.3,.64,1);}
.quest-btns{display:flex;gap:8px;}
.q-minus{padding:8px 18px;border-radius:100px;border:2px solid var(--dim);background:transparent;
  color:var(--muted);cursor:pointer;font-size:18px;font-family:'Nunito',sans-serif;transition:all 0.15s;font-weight:700;}
.q-plus{flex:1;padding:8px 0;border-radius:100px;border:none;font-size:13px;font-weight:800;
  cursor:pointer;font-family:'Nunito',sans-serif;color:#fff;transition:all 0.15s;
  box-shadow:0 3px 12px rgba(0,0,0,0.1);}
.quest-act-row{display:flex;gap:6px;margin-top:10px;}
.quest-act-btn{flex:1;padding:7px;border-radius:12px;border:none;background:var(--bg);
  color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Nunito',sans-serif;transition:all 0.15s;}
.quest-act-btn:hover{background:var(--dim);}
.unlock-label{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin:20px 0 10px;}
.locked-card{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:16px;
  margin-bottom:8px;background:var(--card);box-shadow:0 2px 8px rgba(200,150,150,0.06);}
.locked-card.on{background:var(--mint3);}
.lc-emoji{font-size:22px;}
.lc-name{font-size:14px;font-weight:800;color:var(--muted);}
.locked-card.on .lc-name{color:var(--mint);}
.lc-cond{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;}
.locked-card.on .lc-cond{color:#5bb88a;}

/* ── Shop ── */
.shop-pts-card{background:linear-gradient(135deg,var(--pink),var(--peach));border-radius:var(--radius);
  padding:20px;text-align:center;margin-bottom:20px;box-shadow:0 8px 24px rgba(255,143,171,0.3);}
.shop-pts-label{font-size:12px;font-weight:700;color:rgba(255,255,255,0.8);margin-bottom:4px;}
.shop-pts-num{font-size:36px;font-weight:900;color:#fff;}
.tier-label{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin-bottom:10px;}
.shop-row{display:flex;align-items:center;gap:13px;padding:14px 15px;margin-bottom:10px;
  border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow);
  animation:fadeUp 0.3s ease both;transition:transform 0.15s;}
.shop-row.ns2{background:linear-gradient(135deg,var(--yellow3),var(--peach3));}
.shop-emoji{font-size:30px;}
.shop-info{flex:1;}
.shop-name{font-size:14px;font-weight:800;color:var(--text);}
.shop-desc{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;}
.ns2-bar{height:4px;background:var(--dim);border-radius:100px;margin-top:7px;overflow:hidden;}
.ns2-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--peach));
  border-radius:100px;transition:width 0.8s ease;}
.shop-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.buy-btn{padding:8px 15px;border-radius:100px;cursor:pointer;font-size:12px;font-weight:800;
  white-space:nowrap;font-family:'Nunito',sans-serif;transition:all 0.15s;border:none;
  background:linear-gradient(135deg,var(--pink),var(--peach));color:#fff;
  box-shadow:0 3px 10px rgba(255,143,171,0.3);}
.buy-btn.no{background:var(--dim);color:var(--muted);box-shadow:none;cursor:not-allowed;}
.buy-btn:not(.no):active{transform:scale(0.96);}
.del-btn{background:transparent;border:none;font-size:13px;cursor:pointer;
  color:var(--muted);transition:color 0.15s;padding:2px;}
.del-btn:hover{color:#ff6b6b;}

/* ── Achievements ── */
.ach-summary{background:linear-gradient(135deg,var(--purple3),var(--pink3));
  border-radius:var(--radius);padding:18px;text-align:center;margin-bottom:20px;
  box-shadow:var(--shadow);}
.ach-summary-num{font-size:32px;font-weight:900;color:var(--purple);}
.ach-summary-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;}
.ach-pbar{height:8px;background:rgba(179,157,219,0.2);border-radius:100px;overflow:hidden;}
.ach-pfill{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));
  border-radius:100px;transition:width 0.6s ease;}
.ach-section-label{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin:20px 0 12px;}
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ach-card{padding:16px 13px;border-radius:18px;background:var(--card);
  box-shadow:0 2px 8px rgba(200,150,150,0.06);animation:fadeUp 0.3s ease both;position:relative;overflow:hidden;}
.ach-card.earned{background:linear-gradient(135deg,var(--yellow3),var(--peach3));}
.ach-card.earned::after{content:'✓';position:absolute;bottom:-8px;right:-4px;
  font-size:40px;color:var(--yellow2);font-weight:900;line-height:1;}
.ach-emoji{font-size:28px;margin-bottom:8px;display:block;
  filter:grayscale(1);opacity:0.2;transition:all 0.3s;}
.ach-card.earned .ach-emoji{filter:none;opacity:1;}
.ach-name{font-size:12px;font-weight:800;color:var(--dim);margin-bottom:3px;}
.ach-card.earned .ach-name{color:var(--peach);}
.ach-desc{font-size:10px;color:var(--dim);font-weight:600;line-height:1.4;}
.ach-card.earned .ach-desc{color:var(--muted);}
.ach-badge{position:absolute;top:8px;right:8px;font-size:8px;font-weight:800;
  color:var(--yellow);background:rgba(255,201,71,0.2);padding:2px 8px;
  border-radius:100px;letter-spacing:.5px;}

/* ── Settings ── */
.settings-card{background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.settings-card-header{padding:16px 18px;font-size:13px;font-weight:800;color:var(--text);
  border-bottom:1px solid var(--bg);}
.settings-row{display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;border-bottom:1px solid var(--bg);}
.settings-row:last-child{border-bottom:none;}
.sr-label{font-size:14px;font-weight:700;color:var(--text);}
.sr-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;}
.settings-btn{padding:9px 20px;border-radius:100px;border:none;
  background:var(--pink3);color:var(--pink);font-size:12px;font-weight:800;cursor:pointer;
  font-family:'Nunito',sans-serif;white-space:nowrap;transition:all 0.15s;}
.settings-btn.red{background:#ffe5e5;color:#ff6b6b;}
.settings-btn:active{transform:scale(0.96);}
textarea.export-box{width:100%;background:var(--bg);border:2px solid var(--dim);
  border-radius:14px;padding:12px;color:var(--text);font-size:11px;font-family:monospace;
  resize:vertical;outline:none;min-height:90px;margin-top:10px;font-weight:600;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.13s}
.d4{animation-delay:.18s}.d5{animation-delay:.23s}.d6{animation-delay:.28s}
</style>
</head>
<body>

<div id="notif"></div>
<div id="ach-overlay" onclick="closeAchPopup()"></div>
<div id="ach-popup">
  <div class="ach-pop-tag">🏆 成就解锁！</div>
  <div style="font-size:52px;margin-bottom:10px" id="ap-emoji"></div>
  <div style="font-size:18px;font-weight:900;color:var(--text);margin-bottom:6px" id="ap-name"></div>
  <div style="font-size:12px;color:var(--muted);font-weight:600" id="ap-desc"></div>
  <button class="ach-pop-close" onclick="closeAchPopup()">太棒了！🎉</button>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="task-modal-title">新建任务</h3>
      <button class="modal-close" onclick="closeModal('task-modal')">✕</button>
    </div>
    <div class="field-label">任务名称</div>
    <input class="field-input" id="tm-name" placeholder="例：冥想10分钟">
    <div class="field-label">归属属性</div>
    <div class="attr-pick" id="tm-attr-pick"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">

  {id:'lv10', name:'满级传说',  desc:'任意属性达到Lv.10',    emoji:'🌈',cat:'hidden',fn:s=>Object.values(s.attrs).some(a=>a.level>=10),hidden:true},
];

function qv(s,id){
  const q=[...DEFAULT_QUESTS,...(s.customQuests||[])].find(x=>x.id===id);
  return q?(s.questProgress?.[id]||0):0;
}

// ═══════════════ STATE ═══════════════
const SK='cultivation_v3';
let S;
function def(){return{
  attrs:Object.fromEntries(ATTRS.map(a=>[a.id,{level:1,xp:0}])),
  points:0,totalEarned:0,streak:0,lastDate:null,
  tasksDone:{},hiddenTasks:{},taskOverrides:{},
  evolved:false,customTasks:[],customShop:[],customQuests:[],
  questProgress:{},
  earned:[],tot:0,buys:0,allDay:false,allDays:0,gotNS2:false,
  sleepStreak:0,waterStreak:0,cookCount:0,lastSleepDate:null,lastWaterDate:null,
};}

function load(){
  try{S=JSON.parse(localStorage.getItem(SK))||def();}catch{S=def();}
  const d=def();
  for(const k in d)if(S[k]===undefined)S[k]=d[k];
}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch{}}
function xpN(lv){return 100+(lv-1)*50;}
function addXp(aid,xp){
  if(!S.attrs[aid])return false;
  const a=S.attrs[aid];a.xp+=xp;
  const n=xpN(a.level);if(a.xp>=n){a.xp-=n;a.level++;return true;}return false;
}
function today(){return new Date().toISOString().slice(0,10);}

// ═══════════════ NOTIF ═══════════════
let nT;
function notif(msg,type='pink'){
  const el=document.getElementById('notif');
  el.textContent=msg;
  el.className='show'+(type==='green'?' green':type==='err'?' err':'');
  clearTimeout(nT);nT=setTimeout(()=>el.className='',2900);
}

// ═══════════════ ACHIEVEMENTS ═══════════════
let achQ=[],achBusy=false;
function checkAchs(){
  ACHS.forEach(a=>{
    if(!S.earned.includes(a.id)&&a.fn(S)){S.earned.push(a.id);achQ.push(a);}
  });
  save();popAch();
}
function popAch(){
  if(achBusy||!achQ.length)return;
  achBusy=true;const a=achQ.shift();
  document.getElementById('ap-emoji').textContent=a.emoji;
  document.getElementById('ap-name').textContent=a.name;
  document.getElementById('ap-desc').textContent=a.desc;
  document.getElementById('ach-popup').className='show';
  document.getElementById('ach-overlay').className='show';
}
function closeAchPopup(){
  document.getElementById('ach-popup').className='';
  document.getElementById('ach-overlay').className='';
  achBusy=false;setTimeout(popAch,400);
}

// ═══════════════ TASKS ═══════════════
function allTasks(){
  const base=DEFAULT_TASKS.map(t=>{
    let task=t.id==='clean'&&S.evolved?{...EVOLVED}:{...t};
    if(S.taskOverrides?.[t.id])task={...task,...S.taskOverrides[t.id]};
    return task;
  });
  return[...base,...S.customTasks];
}

function renderTasks(){
  const ts=allTasks(),td=today(),done=S.tasksDone[td]||{};
  const vis=ts.filter(t=>!S.hiddenTasks[t.id]);
  const hid=ts.filter(t=>S.hiddenTasks[t.id]);
  const dc=vis.filter(t=>done[t.id]).length;
  document.getElementById('s-today').textContent=`${dc}/${vis.length}`;
  let h=`<div class="top-bar"><div class="top-bar-fill" style="width:${vis.length?dc/vis.length*100:0}%"></div></div>`;
  h+=`<div class="sec-hdr"><div class="sec-label">📋 今日任务</div><button class="add-btn" onclick="openTaskModal()">＋ 新建</button></div>`;
  vis.forEach((t,i)=>{
    const d=!!done[t.id],a=ATTRS.find(x=>x.id===t.attrId)||ATTRS[0];
    h+=`<div class="task-row${d?' done':''} d${Math.min(i+1,6)}" ${d?'':'onclick="doTask(\''+t.id+'\')"'} style="--c:${a.color}">
      <div class="task-check"><span class="check-inner">✓</span></div>
      <div style="flex:1">
        <div class="task-name">${t.name}</div>
        <div class="task-meta">${a.emoji} ${a.name} · +${t.xp}XP · +${t.pts}分</div>
      </div>
      <div class="task-btns">
        <button class="task-act" onclick="event.stopPropagation();openTaskModal('${t.id}')" title="编辑">✏️</button>
        <button class="task-act" onclick="event.stopPropagation();hideTask('${t.id}')" title="隐藏">🙈</button>
      </div>
    </div>`;
  });
  if(!S.evolved){
    h+=`<div class="evolve-card">
      <div class="evolve-label">⚡ 任务进化</div>
      <div class="evolve-desc">房间收拾好了？点击将「收拾房间」进化成学习任务！</div>
      <button class="evolve-btn" onclick="evolveTask()">进化！→</button>
    </div>`;
  }
  if(hid.length){
    h+=`<div class="sec-hdr" style="margin-top:22px"><div class="sec-label">已隐藏的任务</div></div>`;
    hid.forEach(t=>{
      const a=ATTRS.find(x=>x.id===t.attrId)||ATTRS[0];
      h+=`<div class="task-row" style="opacity:0.4;cursor:default;--c:${a.color}">
        <div class="task-check"></div>
        <div style="flex:1"><div class="task-name">${t.name}</div><div class="task-meta">${a.emoji} ${a.name}</div></div>
        <div class="task-btns"><button class="task-act" style="opacity:1" onclick="showTask('${t.id}')">👁️</button></div>
      </div>`;
    });
  }
  document.getElementById('tab-tasks').innerHTML=h;
}

function doTask(id){
  const td=today();
  if(!S.tasksDone[td])S.tasksDone[td]={};
  if(S.tasksDone[td][id])return;
  const t=allTasks().find(x=>x.id===id);if(!t)return;
  S.tasksDone[td][id]=true;S.tot++;S.points+=t.pts;S.totalEarned+=t.pts;
  const lv=addXp(t.attrId,t.xp);addXp('willpower',5);
  // Special streaks
  const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
  S.streak=S.lastDate===td?S.streak:S.lastDate===yest?S.streak+1:1;
  S.lastDate=td;
  if(id==='sleep'){S.sleepStreak=S.lastSleepDate===yest?S.sleepStreak+1:1;S.lastSleepDate=td;}
  if(id==='water'){S.waterStreak=S.lastWaterDate===yest?S.waterStreak+1:1;S.lastWaterDate=td;}
  if(id==='cook')S.cookCount=(S.cookCount||0)+1;
  // Check all-day
  const vis=allTasks().filter(x=>!S.hiddenTasks[x.id]);
  if(vis.every(x=>S.tasksDone[td][x.id])){
    if(!S.allDay)S.allDay=true;
    S.allDayDates=S.allDayDates||[];
    if(!S.allDayDates.includes(td)){
      S.allDayDates.push(td);
      // check consecutive 7 days
      if(S.allDayDates.length>=7)S.allDays=Math.max(S.allDays||0,S.allDayDates.length);
    }
  }
  save();updateHdr();checkAchs();
  const a=ATTRS.find(x=>x.id===t.attrId);
  if(lv)notif(`🎉 ${a.name} 升级！Lv.${S.attrs[t.attrId].level}`);
  else notif(`✅ 完成！+${t.pts}分 +${t.xp}XP`,'green');
  renderTasks();
}
function evolveTask(){S.evolved=true;save();checkAchs();notif('🌟 任务进化成功！');renderTasks();}
function hideTask(id){S.hiddenTasks[id]=true;save();renderTasks();}
function showTask(id){delete S.hiddenTasks[id];save();renderTasks();}

let editTid=null;
function openTaskModal(id){
  editTid=id||null;
  const isCustom=id&&S.customTasks.find(x=>x.id===id);
  const isBuiltin=id&&DEFAULT_TASKS.find(x=>x.id===id);
  const override=id&&S.taskOverrides?.[id];
  let taskData=null;
  if(isCustom)taskData=S.customTasks.find(x=>x.id===id);
  else if(isBuiltin){
    const base=allTasks().find(x=>x.id===id);
    taskData=base;
  }
  document.getElementById('task-modal-title').textContent=id?'编辑任务':'新建任务';
  document.getElementById('tm-name').value=taskData?taskData.name:'';
  document.getElementById('tm-xp').value=taskData?taskData.xp:10;
  document.getElementById('tm-pts').value=taskData?taskData.pts:10;
  document.getElementById('tm-del-btn').style.display=id?'block':'none';
  document.getElementById('tm-attr-pick').innerHTML=ATTRS.map(a=>{
    const sel=taskData&&taskData.attrId===a.id;
    return`<button class="attr-opt${sel?' sel':''}" style="${sel?'background:'+a.color+';border-color:'+a.color:''}"
      onclick="pickAttr(this,'${a.id}','${a.color}','tm-attr-pick')" data-attr="${a.id}">${a.emoji} ${a.name}</button>`;
  }).join('');
  openModal('task-modal');
}
function saveTaskModal(){
  const name=document.getElementById('tm-name').value.trim();
  const xp=parseInt(document.getElementById('tm-xp').value)||10;
  const pts=parseInt(document.getElementById('tm-pts').value)||10;
  const ab=document.querySelector('#tm-attr-pick .attr-opt.sel');
  const attrId=ab?ab.dataset.attr:'knowledge';
  if(!name){notif('请输入任务名称','err');return;}
  if(editTid){
    const isCustom=S.customTasks.find(x=>x.id===editTid);
    if(isCustom){const t=S.customTasks.find(x=>x.id===editTid);t.name=name;t.xp=xp;t.pts=pts;t.attrId=attrId;}
    else{if(!S.taskOverrides)S.taskOverrides={};S.taskOverrides[editTid]={name,xp,pts,attrId};}
  }else S.customTasks.push({id:'c'+Date.now(),name,attrId,xp,pts});
  save();closeModal('task-modal');renderTasks();notif('✅ 任务已保存！','green');
}
function deleteTask(){
  if(!editTid)return;
  if(S.customTasks.find(x=>x.id===editTid)){
    if(!confirm('确定删除这个任务吗？'))return;
    S.customTasks=S.customTasks.filter(x=>x.id!==editTid);
  } else {
    // builtin: just hide it
    S.hiddenTasks[editTid]=true;
    delete S.taskOverrides?.[editTid];
  }
  save();closeModal('task-modal');renderTasks();notif('任务已删除');
}
function pickAttr(btn,id,color,container){
  document.querySelectorAll('#'+container+' .attr-opt').forEach(b=>{b.classList.remove('sel');b.style.cssText='';});
  btn.classList.add('sel');btn.style.background=color;btn.style.borderColor=color;btn.style.color='#fff';
}

// ═══════════════ ATTRS ═══════════════
function renderAttrs(){
  document.getElementById('tab-attrs').innerHTML='<div class="attr-grid">'+ATTRS.map((a,i)=>{
    const as=S.attrs[a.id],n=xpN(as.level),pct=Math.min(as.xp/n*100,100);
    return`<div class="attr-card${a.locked?' locked':''} d${Math.min(i+1,6)}" style="--cc:${a.bg}">
      ${a.locked?'<span class="lock-badge">🔒</span>':''}
      <div class="attr-emoji">${a.emoji}</div>
      <div class="attr-name" style="color:${a.locked?'#ccc':a.color}">${a.name}</div>
      <div class="attr-desc">${a.desc}</div>
      <div class="attr-lv-row"><span class="attr-lv" style="color:${a.color}">Lv.${as.level}</span><span class="attr-xp">${as.xp}/${n}</span></div>
      <div class="xp-bar"><div class="xp-fill" style="width:${pct}%;background:${a.color};box-shadow:0 0 8px ${a.color}60"></div></div>
    </div>`;
  }).join('')+'</div>';
}

// ═══════════════ QUESTS ═══════════════
function allQuests(){return[...DEFAULT_QUESTS,...(S.customQuests||[])];}

function renderQuests(){
  const qs=allQuests();
  const wDone=((S.questProgress?.weight||0)>=20);
  const eDone=((S.questProgress?.eng||0)>=50);

  let h=`<div class="sec-hdr"><div class="sec-label">🗺️ 进行中的目标</div><button class="add-btn" onclick="openQuestModal()">＋ 新建</button></div>`;

  qs.forEach((q,i)=>{
    const cur=S.questProgress?.[q.id]||0;
    const pct=Math.min(cur/q.goal*100,100);
    const done=cur>=q.goal;
    let sub='';
    if(q.deadline){
      const days=Math.max(0,Math.ceil((new Date(q.deadline)-new Date())/86400000));
      sub=done?'🎉 目标完成！':`距截止还有 ${days} 天`;
    }
    const a=ATTRS.find(x=>x.id===q.attrId)||ATTRS[0];
    h+=`<div class="quest-card d${Math.min(i+1,6)}">
      <div class="quest-top">
        <div>
          <div class="quest-title">${q.emoji} ${q.name} ${done?'✅':''}</div>
          ${sub?`<div class="quest-sub">${sub}</div>`:''}
        </div>
        <div class="quest-num" style="color:${q.color}">${cur}<span>/${q.goal}${q.unit}</span></div>
      </div>
      <div class="quest-bar"><div class="quest-fill" style="width:${pct}%;background:linear-gradient(90deg,${q.color}90,${q.color});box-shadow:0 0 12px ${q.color}50"></div></div>
      <div class="quest-btns">
        <button class="q-minus" onclick="updQ('${q.id}',-1)">−</button>
        <button class="q-plus" style="background:linear-gradient(135deg,${q.color}cc,${q.color})" onclick="updQ('${q.id}',1)">+1 ${q.unit}</button>
      </div>
      <div class="quest-act-row">
        <button class="quest-act-btn" onclick="openQuestModal('${q.id}')">✏️ 编辑</button>
        ${!q.builtin?`<button class="quest-act-btn" onclick="deleteQuestConfirm('${q.id}')">🗑️ 删除</button>`:''}
      </div>
    </div>`;
  });

  h+=`<div class="unlock-label">待解锁支线</div>`;
  h+=`<div class="locked-card${eDone?' on':''}"><div class="lc-emoji">${eDone?'🎸':'🔒'}</div>
    <div><div class="lc-name">开始学吉他</div><div class="lc-cond">${eDone?'✨ 已解锁！可以开始了':'英语打卡满50天解锁'}</div></div></div>`;
  h+=`<div class="locked-card${wDone?' on':''}"><div class="lc-emoji">${wDone?'💃':'🔒'}</div>
    <div><div class="lc-name">学 HipHop</div><div class="lc-cond">${wDone?'✨ 已解锁！可以开始了':'减重目标达成20斤解锁'}</div></div></div>`;

  document.getElementById('tab-quests').innerHTML=h;
}

function updQ(id,delta){
  if(!S.questProgress)S.questProgress={};
  S.questProgress[id]=Math.max(0,(S.questProgress[id]||0)+delta);
  if(delta>0){
    const q=allQuests().find(x=>x.id===id);
    if(q&&q.attrId){const lv=addXp(q.attrId,20);if(lv)notif(`🎉 ${ATTRS.find(a=>a.id===q.attrId)?.name} 升级！`);}
    if(id==='weight')notif('⚖️ 又减了1斤！加油！','green');
    else if(id==='books')notif(`📚 读完第${S.questProgress[id]}本！`,'green');
    else if(id==='eng')notif(`🗣️ 英语打卡第${S.questProgress[id]}天！`,'green');
    else notif(`✅ +1 ${allQuests().find(x=>x.id===id)?.unit||''}`, 'green');
    S.totalEarned=(S.totalEarned||0)+10;
  }
  save();checkAchs();renderQuests();
}

let editQid=null;
const QC_LIST=['#ff8fab','#6dcca0','#5bbcdd','#b39ddb','#ffc947','#ff9d7a','#ff6b9d','#55efc4'];
function openQuestModal(id){
  editQid=id||null;
  const q=id?allQuests().find(x=>x.id===id):null;
  document.getElementById('quest-modal-title').textContent=id?'编辑主线':'新建主线';
  document.getElementById('qm-name').value=q?q.name:'';
  document.getElementById('qm-emoji').value=q?q.emoji:'🎯';
  document.getElementById('qm-goal').value=q?q.goal:30;
  document.getElementById('qm-unit').value=q?q.unit:'天';
  document.getElementById('qm-del-btn').style.display=(id&&!q?.builtin)?'block':'none';
  document.getElementById('qm-color-pick').innerHTML=QC_LIST.map(c=>`
    <div class="color-dot${q&&q.color===c?' sel':''}" style="background:${c}" onclick="pickColor(this,'${c}')"></div>`).join('');
  document.getElementById('qm-attr-pick').innerHTML=ATTRS.map(a=>{
    const sel=q&&q.attrId===a.id;
    return`<button class="attr-opt${sel?' sel':''}" style="${sel?'background:'+a.color+';color:#fff':''}"
      onclick="pickAttr(this,'${a.id}','${a.color}','qm-attr-pick')" data-attr="${a.id}">${a.emoji} ${a.name}</button>`;
  }).join('');
  openModal('quest-modal');
}
function pickColor(dot,color){
  document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('sel'));
  dot.classList.add('sel');
}
function saveQuestModal(){
  const name=document.getElementById('qm-name').value.trim();
  const emoji=document.getElementById('qm-emoji').value.trim()||'🎯';
  const goal=parseInt(document.getElementById('qm-goal').value)||30;
  const unit=document.getElementById('qm-unit').value.trim()||'次';
  const colorDot=document.querySelector('.color-dot.sel');
  const color=colorDot?colorDot.style.background:QC_LIST[0];
  const ab=document.querySelector('#qm-attr-pick .attr-opt.sel');
  const attrId=ab?ab.dataset.attr:'willpower';
  if(!name){notif('请输入目标名称','err');return;}
  if(editQid){
    const q=allQuests().find(x=>x.id===editQid);
    if(q){q.name=name;q.emoji=emoji;q.goal=goal;q.unit=unit;q.color=color;q.attrId=attrId;}
  }else{
    if(!S.customQuests)S.customQuests=[];
    S.customQuests.push({id:'q'+Date.now(),name,emoji,goal,unit,color,attrId});
  }
  save();closeModal('quest-modal');renderQuests();notif('✅ 目标已保存！','green');
}
function deleteQuestConfirm(id){
  editQid=id;deleteQuest();
}
function deleteQuest(){
  if(!editQid)return;
  if(!confirm('确定删除这个主线目标吗？'))return;
  S.customQuests=(S.customQuests||[]).filter(x=>x.id!==editQid);
  save();closeModal('quest-modal');renderQuests();notif('主线已删除');
}

// ═══════════════ SHOP ═══════════════
function allShop(){return[...DEFAULT_SHOP,...(S.customShop||[])];}
function renderShop(){
  let h=`<div class="shop-pts-card"><div class="shop-pts-label">当前积分</div><div class="shop-pts-num">💎 ${S.points}</div></div>`;
  h+=`<div class="sec-hdr"><div class="sec-label">🛒 奖励商城</div><button class="add-btn" onclick="openShopModal()">＋ 新建</button></div>`;
  [
    {label:'🪙 小奖励',  ids:['phone2h','takeout','fishday']},
    {label:'💠 中奖励',  ids:['coffee','musical']},
    {label:'👑 终极大奖',ids:['ns2']},
  ].forEach(tier=>{
    h+=`<div class="tier-label">${tier.label}</div>`;
    DEFAULT_SHOP.filter(i=>tier.ids.includes(i.id)).forEach((item,idx)=>{h+=sRow(item,idx);});
  });
  if((S.customShop||[]).length){
    h+=`<div class="tier-label" style="margin-top:6px">✨ 自定义奖励</div>`;
    S.customShop.forEach((item,idx)=>{h+=sRow(item,idx,true);});
  }
  document.getElementById('tab-shop').innerHTML=h;
}
function sRow(item,idx,custom){
  const can=S.points>=item.cost,ns=item.id==='ns2';
  return`<div class="shop-row${ns?' ns2':''} d${Math.min(idx+1,6)}">
    <div class="shop-emoji">${item.emoji}</div>
    <div class="shop-info">
      <div class="shop-name">${item.name}</div>
      <div class="shop-desc">${item.desc}</div>
      ${ns?`<div class="ns2-bar"><div class="ns2-fill" style="width:${Math.min(S.points/500*100,100)}%"></div></div>`:''}
    </div>
    <div class="shop-right">
      <button class="buy-btn${can?'':' no'}" ${can?`onclick="buyItem('${item.id}')"`:''}>${item.cost}分</button>
      ${custom?`<button class="del-btn" onclick="delShop('${item.id}')">🗑️</button>`:''}
    </div>
  </div>`;
}
function buyItem(id){
  const item=allShop().find(i=>i.id===id);
  if(!item||S.points<item.cost){notif('积分不够哦，继续努力！','err');return;}
  S.points-=item.cost;S.buys++;
  if(id==='ns2')S.gotNS2=true;
  save();checkAchs();updateHdr();renderShop();
  notif(`🎉 成功兑换：${item.name}！`);
}
function delShop(id){S.customShop=(S.customShop||[]).filter(i=>i.id!==id);save();renderShop();notif('已删除');}
function openShopModal(){
  ['sm-name','sm-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('sm-emoji').value='🎁';
  document.getElementById('sm-cost').value='100';
  openModal('shop-modal');
}
function saveShopModal(){
  const name=document.getElementById('sm-name').value.trim();
  const desc=document.getElementById('sm-desc').value.trim();
  const emoji=document.getElementById('sm-emoji').value.trim()||'🎁';
  const cost=parseInt(document.getElementById('sm-cost').value)||100;
  if(!name){notif('请输入奖励名称','err');return;}
  if(!S.customShop)S.customShop=[];
  S.customShop.push({id:'s'+Date.now(),name,desc,emoji,cost});
  save();closeModal('shop-modal');renderShop();notif('✅ 奖励已添加！','green');
}

// ═══════════════ ACHIEVEMENTS ═══════════════
function renderAchieve(){
  const earned=new Set(S.earned);
  const cats=[
    {id:'streak',label:'🔥 连续打卡'},
    {id:'tasks', label:'💪 任务达成'},
    {id:'quests',label:'🗺️ 主线进度'},
    {id:'points',label:'💰 积分达成'},
    {id:'hidden',label:'🌟 隐藏成就'},
  ];
  const tot=ACHS.length,got=earned.size;
  let h=`<div class="ach-summary">
    <div class="ach-summary-num">${got} <span style="font-size:16px;font-weight:700;color:var(--purple)">/ ${tot}</span></div>
    <div class="ach-summary-label">已解锁成就</div>
    <div class="ach-pbar"><div class="ach-pfill" style="width:${got/tot*100}%"></div></div>
  </div>`;
  cats.forEach(cat=>{
    h+=`<div class="ach-section-label">${cat.label}</div><div class="ach-grid">`;
    ACHS.filter(a=>a.cat===cat.id).forEach((a,i)=>{
      const isE=earned.has(a.id),isH=a.hidden&&!isE;
      h+=`<div class="ach-card${isE?' earned':''} d${Math.min(i+1,6)}">
        ${isE?'<div class="ach-badge">已获得</div>':''}
        <span class="ach-emoji">${isH?'🔮':a.emoji}</span>
        <div class="ach-name">${isH?'???':a.name}</div>
        <div class="ach-desc">${isH?'达成特定条件解锁':a.desc}</div>
      </div>`;
    });
    h+='</div>';
  });
  document.getElementById('tab-achieve').innerHTML=h;
}

// ═══════════════ SETTINGS ═══════════════
function renderSettings(){
  document.getElementById('tab-settings').innerHTML=`
  <div class="settings-card">
    <div class="settings-card-header">📦 数据备份</div>
    <div style="padding:14px 18px;font-size:12px;color:var(--muted);font-weight:600;line-height:1.8">
      每次找我修改网页文件前，先在这里导出备份，存到手机备忘录里就万无一失啦～
    </div>
    <div class="settings-row">
      <div><div class="sr-label">导出数据</div><div class="sr-sub">复制备份，保存到备忘录</div></div>
      <button class="settings-btn" onclick="doExport()">导出</button>
    </div>
    <div class="settings-row">
      <div><div class="sr-label">导入数据</div><div class="sr-sub">粘贴备份字符串恢复进度</div></div>
      <button class="settings-btn" onclick="openModal('import-modal')">导入</button>
    </div>
  </div>
  <div class="settings-card">
    <div class="settings-card-header">⚠️ 危险操作</div>
    <div class="settings-row">
      <div><div class="sr-label">重置所有数据</div><div class="sr-sub">清空数据，回到起点</div></div>
      <button class="settings-btn red" onclick="doReset()">重置</button>
    </div>
  </div>
  <div style="text-align:center;margin-top:28px;font-size:11px;color:var(--dim);font-weight:600">
    律律养成计划 🌸 · 数据存于本地浏览器
  </div>`;
}
function doExport(){
  const data=JSON.stringify(S);
  try{navigator.clipboard.writeText(data);}catch{}
  const box=document.createElement('div');
  box.style.cssText='position:fixed;inset:0;background:rgba(61,44,44,0.4);backdrop-filter:blur(3px);z-index:9000;display:flex;align-items:flex-end;justify-content:center';
  box.innerHTML=`<div style="background:var(--bg2);border-radius:28px 28px 0 0;padding:28px 20px;width:100%;max-width:480px;padding-bottom:calc(24px + env(safe-area-inset-bottom,0px))">
    <div style="font-size:15px;font-weight:900;color:var(--mint);margin-bottom:8px">✅ 数据已复制到剪贴板！</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;font-weight:600">也可以长按下方文字框全选，手动复制保存到备忘录</div>
    <textarea class="export-box" readonly onclick="this.select()">${data}</textarea>
    <button class="modal-btn" style="margin-top:14px" onclick="this.closest('div').parentElement.remove()">关闭</button>
  </div>`;
  document.body.appendChild(box);
}
function doImport(){
  try{
    const p=JSON.parse(document.getElementById('import-box').value.trim());
    if(!p.attrs||!p.quests&&!p.questProgress)throw 0;
    S=p;save();closeModal('import-modal');updateHdr();renderAll();
    notif('✅ 数据导入成功！','green');
  }catch{notif('数据格式有误，请检查','err');}
}
function doReset(){
  if(!confirm('确定要重置所有数据吗？此操作不可撤销！'))return;
  S=def();save();updateHdr();renderAll();notif('已重置');
}

// ═══════════════ MODAL / TABS ═══════════════
function openModal(id){document.getElementById(id).className='modal-overlay show';}
function closeModal(id){document.getElementById(id).className='modal-overlay';}
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',function(e){if(e.target===this)this.className='modal-overlay';});
});

function updateHdr(){
  document.getElementById('s-streak').textContent=S.streak;
  document.getElementById('s-pts').textContent=S.points;
}
let curTab='tasks';
function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  ['tasks','attrs','quests','shop','achieve','settings'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'':'none';
  });
  curTab=tab;
  ({tasks:renderTasks,attrs:renderAttrs,quests:renderQuests,shop:renderShop,achieve:renderAchieve,settings:renderSettings})[tab]?.();
}
function renderAll(){
  renderTasks();
  ({attrs:renderAttrs,quests:renderQuests,shop:renderShop,achieve:renderAchieve,settings:renderSettings})[curTab]?.();
}

load();updateHdr();renderTasks();
</script>
</body>
